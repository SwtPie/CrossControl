<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossControl</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── SIDEBAR ── -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>CROSS<br>CONTROL</h1>
      <p>v1.0 — Race Manager</p>
    </div>
    <div class="sidebar-stats">
      <div class="stat-mini"><div class="val" id="stat-participants">0</div><div class="lbl">Élèves</div></div>
      <div class="stat-mini"><div class="val" id="stat-courses">0</div><div class="lbl">Courses</div></div>
      <div class="stat-mini"><div class="val" id="stat-arrivees">0</div><div class="lbl">Arrivées</div></div>
    </div>
    <nav class="nav">
      <div class="nav-section">Données</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="icon">🏠</span> Tableau de bord
      </div>
      <div class="nav-item" data-page="participants" onclick="navigate('participants')">
        <span class="icon">👥</span> Participants
      </div>
      <div class="nav-section">Courses</div>
      <div class="nav-item" data-page="courses" onclick="navigate('courses')">
        <span class="icon">🏁</span> Gestion courses
      </div>
      <div class="nav-item" data-page="live" onclick="navigate('live')">
        <span class="icon">⏱️</span> Course en direct
      </div>
      <div class="nav-section">Résultats</div>
      <div class="nav-item" data-page="terminees" onclick="navigate('terminees')">
        <span class="icon">✅</span> Courses terminées
      </div>
      <div class="nav-item" data-page="classement" onclick="navigate('classement')">
        <span class="icon">🏆</span> Classement
      </div>
    </nav>
  </div>

  <!-- ── MAIN ── -->
  <div id="main">
    <div id="topbar">
      <span id="page-title">Tableau de bord</span>
      <div id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>

</div>

<!-- ── TOAST ── -->
<div id="toast" class="toast-hide"></div>

<!-- ── MODAL : PARTICIPANT ── -->
<div id="modal-participant" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title" id="modal-participant-title">Ajouter un participant</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Nom *</label>
        <input id="p-nom" placeholder="Dupont">
      </div>
      <div class="form-group">
        <label>Prénom *</label>
        <input id="p-prenom" placeholder="Marie">
      </div>
      <div class="form-group">
        <label>Classe</label>
        <input id="p-classe" placeholder="3ème A">
      </div>
      <div class="form-group">
        <label>Établissement</label>
        <input id="p-etablissement" placeholder="Lycée Jaurès">
      </div>
      <div class="form-group">
        <label>Sexe</label>
        <select id="p-sexe">
          <option value="">—</option>
          <option value="F">Féminin</option>
          <option value="M">Masculin</option>
        </select>
      </div>
      <div class="form-group">
        <label>VMA (km/h)</label>
        <input id="p-vma" type="number" step="0.1" placeholder="12.5">
      </div>
      <div class="form-group">
        <label>Dossard</label>
        <input id="p-dossard" type="number" placeholder="Auto">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveParticipant()">💾 Enregistrer</button>
      <button class="btn btn-ghost"   onclick="closeModal('modal-participant')">Annuler</button>
    </div>
  </div>
</div>

<!-- ── MODAL : COURSE ── -->
<div id="modal-course" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title" id="modal-course-title">Créer une course</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Nom de la course *</label>
        <input id="c-nom" placeholder="Course Garçons Niveau 1">
      </div>
      <div class="form-group">
        <label>Distance (mètres) *</label>
        <input id="c-distance" type="number" placeholder="3000">
      </div>
      <div class="form-group">
        <label>VMA min (km/h)</label>
        <input id="c-vma-min" type="number" step="0.1" placeholder="10.0">
      </div>
      <div class="form-group">
        <label>VMA max (km/h)</label>
        <input id="c-vma-max" type="number" step="0.1" placeholder="13.0">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveCourse()">💾 Enregistrer</button>
      <button class="btn btn-ghost"   onclick="closeModal('modal-course')">Annuler</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
