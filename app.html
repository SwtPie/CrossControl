<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionnaire de Cross</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --green: #3ecf6e;
    --red: #e05a5a;
    --blue: #4a9eff;
    --text: #e8ecf4;
    --text2: #8a92a8;
    --text3: #555d72;
    --radius: 6px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overflow: hidden; }

  /* ── LAYOUT ── */
  #app { display: flex; height: 100vh; }
  #sidebar {
    width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 0;
  }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
  }
  #content { flex: 1; overflow-y: auto; padding: 28px; }

  /* ── SIDEBAR ── */
  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo h1 { font-family: var(--font-display); font-size: 28px; color: var(--accent); letter-spacing: 1px; line-height: 1; }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--font-mono); }

  .sidebar-stats {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  }
  .stat-mini { text-align: center; }
  .stat-mini .val { font-family: var(--font-mono); font-size: 20px; font-weight: 600; color: var(--accent); }
  .stat-mini .lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }

  .nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; cursor: pointer; color: var(--text2);
    transition: all .15s; font-size: 13px; font-weight: 400;
    border-left: 3px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { color: var(--accent); background: rgba(240,192,64,.07); border-left-color: var(--accent); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .nav-section { padding: 16px 20px 6px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--font-mono); }

  /* ── TOPBAR ── */
  #page-title { font-family: var(--font-display); font-size: 22px; color: var(--text); letter-spacing: 1px; flex: 1; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
    font-family: var(--font); font-size: 13px; font-weight: 600; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #0d0f14; }
  .btn-primary:hover { background: #f5d060; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #e87070; }
  .btn-success { background: var(--green); color: #0d0f14; }
  .btn-success:hover { background: #5adf88; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-orange { background: var(--accent2); color: #fff; }
  .btn-orange:hover { background: #e87050; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-blue:hover { background: #6ab0ff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── CARDS & TABLES ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .card-title { font-family: var(--font-display); font-size: 16px; color: var(--accent); letter-spacing: 1px; margin-bottom: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-weight: 600; }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(42,47,61,.5); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(30,34,48,.6); }

  /* ── FORMS ── */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); }
  .form-group input, .form-group select {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 8px 10px; font-family: var(--font); font-size: 13px;
    transition: border-color .15s; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--bg); }
  .form-actions { display: flex; gap: 10px; margin-top: 16px; }

  /* ── BADGES ── */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-family: var(--font-mono);
    font-weight: 600;
  }
  .badge-green { background: rgba(62,207,110,.15); color: var(--green); }
  .badge-yellow { background: rgba(240,192,64,.15); color: var(--accent); }
  .badge-red { background: rgba(224,90,90,.15); color: var(--red); }
  .badge-blue { background: rgba(74,158,255,.15); color: var(--blue); }
  .badge-orange { background: rgba(224,90,43,.15); color: var(--accent2); }
  .badge-gray { background: rgba(138,146,168,.1); color: var(--text2); }

  /* ── DASHBOARD COURSE ── */
  .race-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .timer-block {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 32px; text-align: center;
  }
  .timer-display {
    font-family: var(--font-mono); font-size: 64px; font-weight: 600;
    color: var(--accent); letter-spacing: 4px; line-height: 1;
    text-shadow: 0 0 30px rgba(240,192,64,.3);
    margin: 16px 0;
  }
  .timer-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 2px; font-family: var(--font-mono); }
  .timer-controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

  .arrival-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .arrival-count {
    font-family: var(--font-mono); font-size: 48px; font-weight: 600; color: var(--green);
    text-align: center; margin: 12px 0;
  }
  .btn-arrive {
    width: 100%; padding: 18px; font-size: 18px; font-family: var(--font-display);
    letter-spacing: 2px; background: var(--accent2); color: #fff; border: none;
    border-radius: var(--radius); cursor: pointer; transition: all .15s;
    margin-top: 12px;
  }
  .btn-arrive:hover:not(:disabled) { background: #e87050; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(224,90,43,.3); }
  .btn-arrive:disabled { opacity: .3; cursor: not-allowed; transform: none; box-shadow: none; }

  .arrivee-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(42,47,61,.5); }
  .arrivee-order { font-family: var(--font-mono); font-size: 20px; font-weight: 600; color: var(--accent); width: 40px; text-align: right; }
  .arrivee-time { font-family: var(--font-mono); font-size: 12px; color: var(--text3); }
  .arrivee-name { flex: 1; font-size: 13px; }
  .arrivee-dossard input {
    width: 70px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--accent); padding: 4px 6px; font-family: var(--font-mono); font-size: 13px; text-align: center; outline: none;
  }
  .arrivee-dossard input:focus { border-color: var(--accent); }

  /* ── CLASSEMENT ── */
  .podium { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; align-items: flex-end; }
  .podium-item { text-align: center; }
  .podium-place { font-family: var(--font-display); font-size: 40px; }
  .podium-name { font-size: 12px; font-weight: 600; margin-top: 4px; }
  .podium-info { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .p1 .podium-place { color: #ffd700; }
  .p2 .podium-place { color: #c0c0c0; }
  .p3 .podium-place { color: #cd7f32; }

  .pct-bar { display: flex; align-items: center; gap: 8px; }
  .pct-bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .pct-bar-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width .3s; }
  .pct-text { font-family: var(--font-mono); font-size: 12px; color: var(--text2); width: 50px; text-align: right; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 28px; min-width: 420px; max-width: 600px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .modal-title { font-family: var(--font-display); font-size: 20px; color: var(--accent); margin-bottom: 20px; letter-spacing: 1px; }
  .hidden { display: none !important; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 13px; }

  /* ── ALERT / TOAST ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 18px; font-size: 13px; max-width: 320px;
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
    transition: all .3s; transform: translateY(0);
  }
  #toast.toast-success { border-left: 3px solid var(--green); }
  #toast.toast-error { border-left: 3px solid var(--red); }
  #toast.toast-hide { transform: translateY(20px); opacity: 0; pointer-events: none; }

  /* ── COURSE SELECTOR ── */
  .course-select-bar {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px;
  }
  .course-select-bar label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); white-space: nowrap; }
  .course-select-bar select { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 7px 10px; font-family: var(--font); font-size: 13px; outline: none; }
  .course-select-bar select:focus { border-color: var(--accent); }

  /* ── SEARCH ── */
  .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 8px 12px; font-family: var(--font); font-size: 13px; outline: none; }
  .search-bar input:focus { border-color: var(--accent); }

  /* ── SECTION TABS ── */
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .tab { padding: 7px 16px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text2); transition: all .15s; user-select: none; }
  .tab.active { background: var(--accent); color: #0d0f14; }
  .tab:hover:not(.active) { color: var(--text); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 1100px) { .two-col { grid-template-columns: 1fr; } }
  @media (max-width: 900px) { .race-dashboard { grid-template-columns: 1fr; } }

  .info-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-item .lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); }
  .info-item .val { font-size: 14px; font-weight: 600; color: var(--text); }

  .medal { font-size: 18px; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>CROSS<br>MANAGER</h1>
      <p>v1.0 — gestion de cross</p>
    </div>
    <div class="sidebar-stats">
      <div class="stat-mini"><div class="val" id="stat-participants">0</div><div class="lbl">Élèves</div></div>
      <div class="stat-mini"><div class="val" id="stat-courses">0</div><div class="lbl">Courses</div></div>
      <div class="stat-mini"><div class="val" id="stat-arrivees">0</div><div class="lbl">Arrivées</div></div>
    </div>
    <nav class="nav">
      <div class="nav-section">Données</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="icon">🏠</span> Tableau de bord
      </div>
      <div class="nav-item" data-page="participants" onclick="navigate('participants')">
        <span class="icon">👥</span> Participants
      </div>
      <div class="nav-section">Courses</div>
      <div class="nav-item" data-page="courses" onclick="navigate('courses')">
        <span class="icon">🏁</span> Gestion courses
      </div>
      <div class="nav-item" data-page="live" onclick="navigate('live')">
        <span class="icon">⏱️</span> Course en direct
      </div>
      <div class="nav-section">Résultats</div>
      <div class="nav-item" data-page="classement" onclick="navigate('classement')">
        <span class="icon">🏆</span> Classement
      </div>
    </nav>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <span id="page-title">Tableau de bord</span>
      <div id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast-hide"></div>

<!-- MODAL PARTICIPANT -->
<div id="modal-participant" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title" id="modal-participant-title">Ajouter un participant</div>
    <div class="form-grid">
      <div class="form-group"><label>Nom *</label><input id="p-nom" placeholder="Dupont"></div>
      <div class="form-group"><label>Prénom *</label><input id="p-prenom" placeholder="Marie"></div>
      <div class="form-group"><label>Classe</label><input id="p-classe" placeholder="3ème A"></div>
      <div class="form-group"><label>Établissement</label><input id="p-etablissement" placeholder="Lycée Jaurès"></div>
      <div class="form-group">
        <label>Sexe</label>
        <select id="p-sexe"><option value="">—</option><option value="F">Féminin</option><option value="M">Masculin</option></select>
      </div>
      <div class="form-group"><label>VMA (km/h)</label><input id="p-vma" type="number" step="0.1" placeholder="12.5"></div>
      <div class="form-group"><label>Dossard</label><input id="p-dossard" type="number" placeholder="Auto"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveParticipant()">💾 Enregistrer</button>
      <button class="btn btn-ghost" onclick="closeModal('modal-participant')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL COURSE -->
<div id="modal-course" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title" id="modal-course-title">Créer une course</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Nom de la course *</label><input id="c-nom" placeholder="Course Garçons Niveau 1"></div>
      <div class="form-group"><label>Distance (mètres) *</label><input id="c-distance" type="number" placeholder="3000"></div>
      <div class="form-group"><label>VMA min (km/h)</label><input id="c-vma-min" type="number" step="0.1" placeholder="10.0"></div>
      <div class="form-group"><label>VMA max (km/h)</label><input id="c-vma-max" type="number" step="0.1" placeholder="13.0"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveCourse()">💾 Enregistrer</button>
      <button class="btn btn-ghost" onclick="closeModal('modal-course')">Annuler</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════════════════
let state = {
  page: 'dashboard',
  participants: [],
  courses: [],
  editParticipantId: null,
  editCourseId: null,
  selectedCourseId: null,
  liveTimer: null,
  liveStartTime: null,
  liveElapsed: 0,
  liveArrivees: [],
  filterSearch: '',
};

// ════════════════════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════════════════════
let api = null;

async function call(method, ...args) {
  if (!api) {
    console.error('[API] pywebview.api non disponible — êtes-vous bien dans pywebview ?');
    return null;
  }
  console.log(`[API] → ${method}(`, ...args, ')');
  try {
    const result = await api[method](...args);
    console.log(`[API] ← ${method} résultat :`, result);
    return result;
  } catch (err) {
    console.error(`[API] ✗ ${method} EXCEPTION :`, err);
    return null;
  }
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast-${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.add('toast-hide'), 3000);
}

function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function vmaColor(vma) {
  if (!vma) return 'gray';
  if (vma < 11) return 'blue';
  if (vma < 13) return 'yellow';
  if (vma < 15) return 'orange';
  return 'green';
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

// ════════════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════════════════════════
async function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  await refreshData();
  render();
}

async function refreshData() {
  console.log('[refreshData] chargement...');
  const [participants, courses, stats] = await Promise.all([
    call('get_participants'),
    call('get_courses'),
    call('get_stats'),
  ]);
  state.participants = participants || [];
  state.courses = courses || [];
  console.log(`[refreshData] ${state.participants.length} participants, ${state.courses.length} courses`);
  if (stats) {
    document.getElementById('stat-participants').textContent = stats.participants;
    document.getElementById('stat-courses').textContent = stats.courses;
    document.getElementById('stat-arrivees').textContent = stats.arrivees;
  }
}

// ════════════════════════════════════════════════════════════════════════════════
// RENDER DISPATCHER
// ════════════════════════════════════════════════════════════════════════════════
function render() {
  const titles = {
    dashboard: 'Tableau de bord',
    participants: 'Participants',
    courses: 'Gestion des courses',
    live: 'Course en direct',
    classement: 'Classement & résultats',
  };
  document.getElementById('page-title').textContent = titles[state.page] || '';
  document.getElementById('topbar-actions').innerHTML = '';

  const pages = { dashboard: renderDashboard, participants: renderParticipants, courses: renderCourses, live: renderLive, classement: renderClassement };
  (pages[state.page] || (() => {}))();
}

// ════════════════════════════════════════════════════════════════════════════════
// PAGE : DASHBOARD
// ════════════════════════════════════════════════════════════════════════════════
function renderDashboard() {
  const enCours = state.courses.find(c => c.statut === 'en_cours');

function renderParticipants() {
  const tb = document.getElementById('topbar-actions');
  tb.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="autoAssignDossards()">🔢 Auto-dossards</button>
    <button class="btn btn-primary" onclick="openAddParticipant()">+ Ajouter</button>
  `;

  const filtered = state.participants.filter(p => {
    const q = state.filterSearch.toLowerCase();
    return !q || `${p.nom} ${p.prenom} ${p.classe} ${p.etablissement}`.toLowerCase().includes(q);
  });

  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <input type="text" placeholder="Rechercher (nom, prénom, classe, établissement…)" value="${state.filterSearch}"
        oninput="state.filterSearch=this.value;renderParticipants()">
      <span style="font-size:12px;color:var(--text3);align-self:center;white-space:nowrap">${filtered.length} / ${state.participants.length}</span>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Dossard</th><th>Nom</th><th>Prénom</th><th>Classe</th><th>Établissement</th><th>Sexe</th><th>VMA</th><th></th></tr></thead>
        <tbody id="participants-tbody">
          ${filtered.length ? filtered.map(p => `
            <tr>
              <td><span class="badge badge-yellow" style="font-family:var(--font-mono)">${p.dossard ?? '—'}</span></td>
              <td><strong>${p.nom}</strong></td>
              <td>${p.prenom}</td>
              <td>${p.classe || '—'}</td>
              <td>${p.etablissement || '—'}</td>
              <td>${p.sexe === 'F' ? '♀ F' : p.sexe === 'M' ? '♂ M' : '—'}</td>
              <td><span class="badge badge-${vmaColor(p.vma)}">${p.vma ?? '—'}</span></td>
              <td style="display:flex;gap:6px">
                <button class="btn btn-ghost btn-sm" onclick="openEditParticipant(${p.id})">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteParticipant(${p.id}, '${p.nom} ${p.prenom}')">🗑️</button>
              </td>
            </tr>`).join('') : `<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:32px">Aucun participant trouvé</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function openAddParticipant() {
  state.editParticipantId = null;
  document.getElementById('modal-participant-title').textContent = 'Ajouter un participant';
  ['nom','prenom','classe','etablissement','vma','dossard'].forEach(f => document.getElementById(`p-${f}`).value = '');
  document.getElementById('p-sexe').value = '';
  openModal('modal-participant');
}

function openEditParticipant(id) {
  const p = state.participants.find(x => x.id === id);
  if (!p) return;
  state.editParticipantId = id;
  document.getElementById('modal-participant-title').textContent = 'Modifier le participant';
  document.getElementById('p-nom').value = p.nom || '';
  document.getElementById('p-prenom').value = p.prenom || '';
  document.getElementById('p-classe').value = p.classe || '';
  document.getElementById('p-etablissement').value = p.etablissement || '';
  document.getElementById('p-sexe').value = p.sexe || '';
  document.getElementById('p-vma').value = p.vma ?? '';
  document.getElementById('p-dossard').value = p.dossard ?? '';
  openModal('modal-participant');
}

async function saveParticipant() {
  const nom = document.getElementById('p-nom').value.trim();
  const prenom = document.getElementById('p-prenom').value.trim();
  if (!nom || !prenom) { toast('Nom et prénom requis', 'error'); return; }
  const data = {
    nom, prenom,
    classe: document.getElementById('p-classe').value.trim(),
    etablissement: document.getElementById('p-etablissement').value.trim(),
    sexe: document.getElementById('p-sexe').value,
    vma: parseFloat(document.getElementById('p-vma').value) || null,
    dossard: parseInt(document.getElementById('p-dossard').value) || null,
  };
  console.log('[saveParticipant] data préparé :', JSON.stringify(data));
  console.log('[saveParticipant] editId :', state.editParticipantId);
  let res;
  if (state.editParticipantId) {
    res = await call('update_participant', state.editParticipantId, data);
  } else {
    res = await call('add_participant', data);
  }
  console.log('[saveParticipant] réponse :', res);
  if (res?.success) {
    closeModal('modal-participant');
    toast(state.editParticipantId ? 'Participant modifié' : 'Participant ajouté');
    await refreshData();
    renderParticipants();
  } else {
    const errMsg = res?.error || 'Erreur inconnue (res=' + JSON.stringify(res) + ')';
    console.error('[saveParticipant] ERREUR :', errMsg);
    toast(errMsg, 'error');
  }
}

async function deleteParticipant(id, name) {
  if (!confirm(`Supprimer ${name} ?`)) return;
  await call('delete_participant', id);
  toast('Participant supprimé');
  await refreshData();
  renderParticipants();
}

async function autoAssignDossards() {
  const start = parseInt(prompt('Numéro de dossard de départ ?', '1')) || 1;
  const res = await call('auto_assign_dossards', start);
  if (res?.success) {
    toast(`${res.count} dossards attribués à partir du n°${start}`);
    await refreshData();
    renderParticipants();
  }
}

let courseTab = 'liste';
let selectedCourseDetailId = null;
let courseParticipants = [];

async function renderCourses() {
  const tb = document.getElementById('topbar-actions');
  tb.innerHTML = `<button class="btn btn-primary" onclick="openAddCourse()">+ Nouvelle course</button>`;

  if (selectedCourseDetailId) {
    const cp = await call('get_course_participants', selectedCourseDetailId);
    courseParticipants = cp || [];
  }

  const course = state.courses.find(c => c.id === selectedCourseDetailId);

  document.getElementById('content').innerHTML = `
    <div class="two-col">
      <!-- LISTE COURSES -->
      <div>
        <div class="card">
          <div class="card-title">Courses créées</div>
          ${state.courses.length ? `<table>
            <thead><tr><th>Nom</th><th>Distance</th><th>Statut</th><th></th></tr></thead>
            <tbody>${state.courses.map(c => `
              <tr style="cursor:pointer;${c.id===selectedCourseDetailId?'background:rgba(240,192,64,.05)':''}" onclick="selectCourseDetail(${c.id})">
                <td><strong>${c.nom}</strong></td>
                <td style="font-family:var(--font-mono)">${c.distance ? c.distance+'m' : '—'}</td>
                <td>${statusBadge(c.statut)}</td>
                <td style="display:flex;gap:4px">
                  <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditCourse(${c.id})">✏️</button>
                  <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteCourse(${c.id},'${c.nom}')">🗑️</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>` : `<div class="empty"><div class="empty-icon">🏁</div><p>Aucune course. Créez-en une !</p></div>`}
        </div>
      </div>

      <!-- DETAIL COURSE -->
      <div>
        ${course ? `
        <div class="card">
          <div class="card-header">
            <div class="card-title" style="margin-bottom:0">${course.nom}</div>
            ${statusBadge(course.statut)}
          </div>
          <div class="info-row">
            <div class="info-item"><div class="lbl">Distance</div><div class="val">${course.distance ? course.distance+'m' : '—'}</div></div>
            <div class="info-item"><div class="lbl">VMA min</div><div class="val">${course.vma_min ?? '—'}</div></div>
            <div class="info-item"><div class="lbl">VMA max</div><div class="val">${course.vma_max ?? '—'}</div></div>
            <div class="info-item"><div class="lbl">Participants</div><div class="val">${courseParticipants.length}</div></div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
            <button class="btn btn-blue btn-sm" onclick="autoAddByVma(${course.id})">🔄 Auto-ajouter par VMA</button>
          </div>

          <div class="tabs">
            <div class="tab ${courseTab==='liste'?'active':''}" onclick="courseTab='liste';renderCourses()">Inscrits (${courseParticipants.length})</div>
            <div class="tab ${courseTab==='ajouter'?'active':''}" onclick="courseTab='ajouter';renderCourses()">Ajouter</div>
          </div>

          ${courseTab === 'liste' ? `
            ${courseParticipants.length ? `<table>
              <thead><tr><th>Dossard</th><th>Nom</th><th>Classe</th><th>VMA</th><th></th></tr></thead>
              <tbody>${courseParticipants.map(p => `
                <tr>
                  <td><span class="badge badge-yellow">${p.dossard ?? '—'}</span></td>
                  <td>${p.nom} ${p.prenom}</td>
                  <td>${p.classe || '—'}</td>
                  <td><span class="badge badge-${vmaColor(p.vma)}">${p.vma ?? '—'}</span></td>
                  <td><button class="btn btn-danger btn-sm" onclick="removeFromCourse(${course.id},${p.id})">✕</button></td>
                </tr>`).join('')}
              </tbody>
            </table>` : `<div class="empty" style="padding:24px"><p>Aucun inscrit. Utilisez "Ajouter" ou "Auto-ajouter par VMA".</p></div>`}
          ` : `
            <div style="margin-bottom:10px">
              <input type="text" id="add-search" placeholder="Rechercher un participant…" oninput="renderAddList()" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:8px 10px;font-family:var(--font);font-size:13px;outline:none">
            </div>
            <div id="add-list" style="max-height:280px;overflow-y:auto"></div>
          `}
        </div>` : `
        <div class="card">
          <div class="empty"><div class="empty-icon">👈</div><p>Sélectionnez une course pour gérer ses participants</p></div>
        </div>`}
      </div>
    </div>
  `;

  if (courseTab === 'ajouter' && course) renderAddList();
}

function renderAddList() {
  const q = (document.getElementById('add-search')?.value || '').toLowerCase();
  const inscritIds = new Set(courseParticipants.map(p => p.id));
  const available = state.participants.filter(p => {
    if (inscritIds.has(p.id)) return false;
    return !q || `${p.nom} ${p.prenom} ${p.classe}`.toLowerCase().includes(q);
  });
  const el = document.getElementById('add-list');
  if (!el) return;
  el.innerHTML = available.length ? `<table>
    <thead><tr><th>Dossard</th><th>Nom</th><th>Classe</th><th>VMA</th><th></th></tr></thead>
    <tbody>${available.map(p => `
      <tr>
        <td><span class="badge badge-yellow">${p.dossard ?? '—'}</span></td>
        <td>${p.nom} ${p.prenom}</td>
        <td>${p.classe || '—'}</td>
        <td><span class="badge badge-${vmaColor(p.vma)}">${p.vma ?? '—'}</span></td>
        <td><button class="btn btn-success btn-sm" onclick="addToCourse(${selectedCourseDetailId},${p.id})">+ Inscrire</button></td>
      </tr>`).join('')}
    </tbody>
  </table>` : `<div class="empty" style="padding:16px"><p>Aucun participant disponible</p></div>`;
}

async function selectCourseDetail(id) {
  selectedCourseDetailId = id;
  courseTab = 'liste';
  await renderCourses();
}

async function addToCourse(cid, pid) {
  await call('add_participant_to_course', cid, pid);
  const cp = await call('get_course_participants', cid);
  courseParticipants = cp || [];
  renderCourses();
}

async function removeFromCourse(cid, pid) {
  await call('remove_participant_from_course', cid, pid);
  const cp = await call('get_course_participants', cid);
  courseParticipants = cp || [];
  renderCourses();
}

async function autoAddByVma(cid) {
  const res = await call('auto_add_by_vma', cid);
  if (res?.success) {
    toast(`${res.count} participant(s) ajouté(s) selon la VMA`);
    const cp = await call('get_course_participants', cid);
    courseParticipants = cp || [];
    renderCourses();
  } else {
    toast(res?.error || 'Erreur', 'error');
  }
}

function openAddCourse() {
  state.editCourseId = null;
  document.getElementById('modal-course-title').textContent = 'Créer une course';
  ['nom','distance','vma-min','vma-max'].forEach(f => document.getElementById(`c-${f}`).value = '');
  openModal('modal-course');
}

function openEditCourse(id) {
  const c = state.courses.find(x => x.id === id);
  if (!c) return;
  state.editCourseId = id;
  document.getElementById('modal-course-title').textContent = 'Modifier la course';
  document.getElementById('c-nom').value = c.nom || '';
  document.getElementById('c-distance').value = c.distance ?? '';
  document.getElementById('c-vma-min').value = c.vma_min ?? '';
  document.getElementById('c-vma-max').value = c.vma_max ?? '';
  openModal('modal-course');
}

async function saveCourse() {
  const nom = document.getElementById('c-nom').value.trim();
  if (!nom) { toast('Nom requis', 'error'); return; }
  const data = {
    nom,
    distance: parseFloat(document.getElementById('c-distance').value) || null,
    vma_min: parseFloat(document.getElementById('c-vma-min').value) || null,
    vma_max: parseFloat(document.getElementById('c-vma-max').value) || null,
  };
  let res;
  if (state.editCourseId) {
    res = await call('update_course', state.editCourseId, data);
  } else {
    res = await call('add_course', data);
  }
  if (res?.success) {
    closeModal('modal-course');
    toast(state.editCourseId ? 'Course modifiée' : 'Course créée');
    await refreshData();
    renderCourses();
  }
}

async function deleteCourse(id, name) {
  if (!confirm(`Supprimer "${name}" et toutes ses données ?`)) return;
  await call('delete_course', id);
  if (selectedCourseDetailId === id) selectedCourseDetailId = null;
  toast('Course supprimée');
  await refreshData();
  renderCourses();
}

function statusBadge(s) {
  const map = { preparation: ['gray','En préparation'], en_cours: ['orange','⚡ En cours'], terminee: ['green','✓ Terminée'] };
  const [cls, lbl] = map[s] || ['gray', s];
  return `<span class="badge badge-${cls}">${lbl}</span>`;
}

// PAGE : LIVE (COURSE EN DIRECT)
// ════════════════════════════════════════════════════════════════════════════════
let liveSelectedId = null;
let liveArrivees = [];
let timerInterval = null;
let timerStart = null;
let timerElapsed = 0;
let timerRunning = false;

function selectCourseForLive(id) {
  liveSelectedId = id;
  renderLive();
}

async function renderLive() {
  document.getElementById('content').innerHTML = `
    <div class="course-select-bar">
      <label>Sélectionner une course</label>
      <select id="live-course-select" onchange="liveSelectedId=parseInt(this.value)||null;resetLiveState();loadLiveArrivees()">
        <option value="">— Choisir —</option>
        ${state.courses.filter(c=>c.statut!=='terminee').map(c=>`<option value="${c.id}" ${c.id===liveSelectedId?'selected':''}>${c.nom} ${statusBadge(c.statut)}</option>`).join('')}
      </select>
    </div>
    <div id="live-body"></div>
  `;
  if (liveSelectedId) await loadLiveArrivees();
}

async function loadLiveArrivees() {
  if (!liveSelectedId) return;
  const arrs = await call('get_arrivees', liveSelectedId);
  liveArrivees = arrs || [];
  const course = state.courses.find(c => c.id === liveSelectedId);
  renderLiveBody(course);
}

function resetLiveState() {
  stopTimer();
  timerElapsed = 0;
  timerStart = null;
  liveArrivees = [];
}

function renderLiveBody(course) {
  if (!course) { document.getElementById('live-body').innerHTML = ''; return; }

  const isRunning = timerRunning;
  const isStarted = course.statut === 'en_cours' || course.statut === 'terminee';
  const isFinished = course.statut === 'terminee';

  document.getElementById('live-body').innerHTML = `
    <div class="race-dashboard">
      <!-- TIMER -->
      <div>
        <div class="timer-block">
          <div class="timer-label">Chronomètre</div>
          <div class="timer-display" id="timer-display">${formatTime(timerElapsed)}</div>
          <div class="timer-label" id="timer-course-name">${course.nom}</div>
          <div class="timer-controls">
            ${!isStarted ? `<button class="btn btn-success" id="btn-start" onclick="startRace()">▶ Démarrer</button>` : ''}
            ${isStarted && !isFinished ? `
              ${isRunning
                ? `<button class="btn btn-ghost" onclick="pauseTimer()">⏸ Pause</button>`
                : `<button class="btn btn-success" onclick="resumeTimer()">▶ Reprendre</button>`}
              <button class="btn btn-danger" onclick="finishRace()">🏁 Terminer</button>
            ` : ''}
            ${isFinished ? `<span class="badge badge-green" style="font-size:14px;padding:8px 16px">✓ Course terminée</span>` : ''}
          </div>
          ${isStarted && !isFinished ? `
          <div style="margin-top:24px">
            <button class="btn-arrive" id="btn-arrive" onclick="recordArrival()" ${isFinished?'disabled':''}>
              🏃 UN PARTICIPANT EST ARRIVÉ !
            </button>
            <div style="font-size:11px;color:var(--text3);margin-top:8px;font-family:var(--font-mono)">
              Appuyez à chaque arrivée — le dossard sera saisi après
            </div>
          </div>` : ''}
          ${isFinished && liveArrivees.some(a=>!a.dossard_saisi) ? `
          <div style="margin-top:16px;padding:12px;background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.2);border-radius:var(--radius)">
            <div style="font-size:12px;color:var(--accent);margin-bottom:8px;font-family:var(--font-mono)">
              ⚠ Saisir les dossards (tige d'arrivée) pour finaliser le classement
            </div>
          </div>` : ''}
        </div>

        ${isStarted ? `
        <div class="card" style="margin-top:16px">
          <div class="card-header">
            <div class="card-title" style="margin-bottom:0">Arrivées enregistrées</div>
            <span class="badge badge-green" style="font-size:16px;padding:6px 14px">${liveArrivees.length}</span>
          </div>
          <div style="max-height:200px;overflow-y:auto">
            ${liveArrivees.length ? liveArrivees.map(a => `
              <div class="arrivee-row">
                <div class="arrivee-order">${a.ordre_arrivee}</div>
                <div style="flex:1">
                  <div class="arrivee-time">${formatTime(a.temps_secondes || 0)}</div>
                  ${a.nom ? `<div style="font-size:12px;color:var(--text)">${a.nom} ${a.prenom} <span style="color:var(--text3)">#${a.dossard_participant}</span></div>` : ''}
                </div>
              </div>`).join('') : `<div style="text-align:center;color:var(--text3);padding:16px;font-size:12px">Aucune arrivée enregistrée</div>`}
          </div>
        </div>` : ''}
      </div>

      <!-- SAISIE DOSSARDS -->
      <div>
        <div class="card">
          <div class="card-title">Saisie des dossards</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6">
            Après la course, récupérez la pile de dossards <strong style="color:var(--accent)">dans l'ordre inverse</strong> (le dessus de la pile = 1er arrivé).
            Saisissez les dossards un par un ci-dessous.
          </div>
          ${liveArrivees.length ? `
          <div style="max-height:400px;overflow-y:auto">
            ${liveArrivees.map(a => `
              <div class="arrivee-row" id="row-${a.id}">
                <div class="arrivee-order">${a.ordre_arrivee}</div>
                <div style="flex:1">
                  <div class="arrivee-time">${formatTime(a.temps_secondes || 0)}</div>
                  ${a.nom ? `<div style="font-size:12px;color:var(--green)">✓ ${a.nom} ${a.prenom}</div>` : '<div style="font-size:11px;color:var(--text3)">En attente...</div>'}
                </div>
                <div class="arrivee-dossard">
                  ${a.dossard_saisi
                    ? `<span class="badge badge-yellow">#${a.dossard_saisi}</span>`
                    : `<input type="number" placeholder="N°" id="dossard-input-${a.id}"
                        onkeydown="if(event.key==='Enter')assignDossard(${a.id},this.value)"
                        style="width:70px">`
                  }
                </div>
                ${!a.dossard_saisi ? `<button class="btn btn-primary btn-sm" onclick="assignDossard(${a.id},document.getElementById('dossard-input-${a.id}').value)">✓</button>` : ''}
              </div>`).join('')}
          </div>` : `
          <div class="empty" style="padding:24px"><p>Les arrivées enregistrées apparaîtront ici pour la saisie des dossards</p></div>`}
        </div>
      </div>
    </div>
  `;
}

async function startRace() {
  if (!liveSelectedId) return;
  const res = await call('start_course', liveSelectedId);
  if (res?.success) {
    startTimer();
    await refreshData();
    await loadLiveArrivees();
    toast('Course démarrée !');
  }
}

async function finishRace() {
  if (!confirm('Terminer la course ?')) return;
  stopTimer();
  await call('finish_course', liveSelectedId);
  await refreshData();
  await loadLiveArrivees();
  toast('Course terminée ! Saisissez les dossards pour le classement.');
}

function startTimer() {
  timerStart = Date.now() - timerElapsed * 1000;
  timerRunning = true;
  timerInterval = setInterval(() => {
    timerElapsed = (Date.now() - timerStart) / 1000;
    const el = document.getElementById('timer-display');
    if (el) el.textContent = formatTime(timerElapsed);
  }, 200);
}

function pauseTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  const course = state.courses.find(c => c.id === liveSelectedId);
  renderLiveBody(course);
}

function resumeTimer() {
  timerStart = Date.now() - timerElapsed * 1000;
  timerRunning = true;
  const course = state.courses.find(c => c.id === liveSelectedId);
  renderLiveBody(course);
  timerInterval = setInterval(() => {
    timerElapsed = (Date.now() - timerStart) / 1000;
    const el = document.getElementById('timer-display');
    if (el) el.textContent = formatTime(timerElapsed);
  }, 200);
}

function stopTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
}

async function recordArrival() {
  if (!liveSelectedId) return;
  const temps = timerElapsed;
  const res = await call('enregistrer_arrivee', liveSelectedId, temps);
  if (res?.success) {
    liveArrivees.push({ id: res.arrivee_id, ordre_arrivee: res.ordre, temps_secondes: temps, dossard_saisi: null, nom: null });
    const btn = document.getElementById('btn-arrive');
    if (btn) { btn.style.transform = 'scale(0.97)'; setTimeout(() => btn.style.transform = '', 150); }
    await loadLiveArrivees();
  }
}

async function assignDossard(arriveeId, dossard) {
  const d = parseInt(dossard);
  if (!d) { toast('Numéro de dossard invalide', 'error'); return; }
  const res = await call('assigner_dossard_arrivee', arriveeId, d);
  if (res?.success) {
    await loadLiveArrivees();
    toast(`Dossard #${d} assigné`);
  } else {
    toast(res?.error || 'Erreur', 'error');
  }
}

// ════════════════════════════════════════════════════════════════════════════════
// PAGE : CLASSEMENT
// ════════════════════════════════════════════════════════════════════════════════
let classementCourseId = null;

function selectCourseForClassement(id) {
  classementCourseId = id;
  renderClassement();
}

async function renderClassement() {
  document.getElementById('content').innerHTML = `
    <div class="course-select-bar">
      <label>Sélectionner une course</label>
      <select id="classement-course-select" onchange="classementCourseId=parseInt(this.value)||null;renderClassement()">
        <option value="">— Choisir —</option>
        ${state.courses.map(c=>`<option value="${c.id}" ${c.id===classementCourseId?'selected':''}>${c.nom}</option>`).join('')}
      </select>
    </div>
    <div id="classement-body"></div>
  `;
  if (!classementCourseId) return;

  const classement = await call('get_classement', classementCourseId);
  const course = state.courses.find(c => c.id === classementCourseId);
  if (!classement || !classement.length) {
    document.getElementById('classement-body').innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Aucun résultat disponible.<br>Vérifiez que les dossards ont été saisis après la course.</p></div>`;
    return;
  }

  const top3 = classement.slice(0, 3);

  document.getElementById('classement-body').innerHTML = `
    ${top3.length >= 2 ? `
    <div class="card" style="text-align:center">
      <div class="card-title" style="text-align:center">Podium — ${course?.nom || ''}</div>
      <div class="podium">
        ${top3[1] ? `<div class="podium-item p2"><div class="podium-place">🥈</div><div class="podium-name">${top3[1].nom} ${top3[1].prenom}</div><div class="podium-info">${formatTime(top3[1].temps_secondes||0)}<br>${top3[1].pct_vma ? top3[1].pct_vma+'% VMA' : ''}</div></div>` : ''}
        ${top3[0] ? `<div class="podium-item p1" style="margin-bottom:24px"><div class="podium-place">🥇</div><div class="podium-name" style="font-size:15px;font-weight:700">${top3[0].nom} ${top3[0].prenom}</div><div class="podium-info">${formatTime(top3[0].temps_secondes||0)}<br>${top3[0].pct_vma ? top3[0].pct_vma+'% VMA' : ''}</div></div>` : ''}
        ${top3[2] ? `<div class="podium-item p3"><div class="podium-place">🥉</div><div class="podium-name">${top3[2].nom} ${top3[2].prenom}</div><div class="podium-info">${formatTime(top3[2].temps_secondes||0)}<br>${top3[2].pct_vma ? top3[2].pct_vma+'% VMA' : ''}</div></div>` : ''}
      </div>
    </div>` : ''}

    <div class="card">
      <div class="card-title">Classement complet</div>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Dossard</th><th>Nom</th><th>Classe</th><th>Établ.</th>
            <th>Temps</th><th>Vitesse</th><th>% VMA</th>
          </tr>
        </thead>
        <tbody>
          ${classement.map((r, i) => `
            <tr>
              <td style="font-family:var(--font-mono);font-weight:700;color:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--text)'}">
                ${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
              </td>
              <td><span class="badge badge-yellow">#${r.num_dossard ?? '?'}</span></td>
              <td><strong>${r.nom || '?'} ${r.prenom || ''}</strong></td>
              <td>${r.classe || '—'}</td>
              <td style="font-size:12px;color:var(--text2)">${r.etablissement || '—'}</td>
              <td style="font-family:var(--font-mono);color:var(--accent)">${formatTime(r.temps_secondes||0)}</td>
              <td style="font-family:var(--font-mono)">${r.vitesse_kmh ? r.vitesse_kmh+' km/h' : '—'}</td>
              <td>
                ${r.pct_vma ? `<div class="pct-bar">
                  <div class="pct-bar-track"><div class="pct-bar-fill" style="width:${Math.min(r.pct_vma,120)}%;background:${r.pct_vma>=100?'var(--accent)':r.pct_vma>=80?'var(--green)':'var(--blue)'}"></div></div>
                  <div class="pct-text">${r.pct_vma}%</div>
                </div>` : '—'}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════════
async function init() {
  console.log('[init] démarrage de l\'application');
  console.log('[init] window.pywebview :', window.pywebview);
  console.log('[init] window.pywebview?.api :', window.pywebview?.api);
  await refreshData();
  render();
  console.log('[init] OK');
}

// pywebview injecte l'API de façon asynchrone — on attend l'événement dédié
window.addEventListener('pywebviewready', () => {
  console.log('[pywebviewready] API disponible :', window.pywebview.api);
  api = window.pywebview.api;
  init();
});

// Fallback : si on ouvre le fichier directement dans un navigateur (dev)
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    if (!api) {
      if (window.pywebview?.api) {
        console.log('[DOMContentLoaded fallback] API trouvée via pywebview');
        api = window.pywebview.api;
        init();
      } else {
        console.warn('[DOMContentLoaded fallback] Pas d\'API pywebview — mode navigateur ?');
        init(); // init quand même pour afficher l'UI
      }
    }
  }, 500);
});
</script>
